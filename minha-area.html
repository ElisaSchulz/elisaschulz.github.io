<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Área — HZ Invest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-dark:   #120e4e;
    --teal:        #6bbfb5;
    --teal-light:  #8dd4cb;
    --teal-dim:    rgba(107,191,181,0.14);
    --teal-border: rgba(107,191,181,0.25);
    --white-pure:  #ffffff;
    --muted:       rgba(196,193,230,0.55);
    --text:        rgba(220,218,245,0.88);
    --border:      rgba(107,191,181,0.12);
    --green:       #4ade80;
    --amber:       #fbbf24;
    --navy-card:   rgba(26,20,100,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--navy-dark);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 17px;
    line-height: 1.65;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 50% at 15% 10%, rgba(107,191,181,0.07) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(circle, rgba(107,191,181,0.13) 1px, transparent 1px);
    background-size: 40px 40px;
    mask-image: radial-gradient(ellipse 100% 100% at 50% 50%, black 0%, transparent 80%);
    pointer-events: none; z-index: 0; opacity: 0.25;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0 5%; height: 70px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(18,14,78,0.9); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Outfit', sans-serif; font-weight: 900;
    font-size: 1.35rem; color: var(--white-pure);
    text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .nav-right { display: flex; align-items: center; gap: 1.2rem; }
  .nav-back {
    display: inline-flex; align-items: center; gap: 0.4rem;
    color: var(--muted); text-decoration: none; font-size: 0.85rem;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--teal); }
  #nav-user-pill { display: none; align-items: center; gap: 0.75rem; }
  .nav-user-name { font-size: 0.85rem; color: var(--teal-light); font-weight: 600; }
  .nav-signout {
    background: transparent; border: 1px solid var(--teal-border);
    color: var(--muted); font-family: 'Fira Code', monospace; font-size: 0.7rem;
    padding: 0.25rem 0.7rem; border-radius: 4px; cursor: pointer; transition: all 0.2s;
  }
  .nav-signout:hover { border-color: var(--teal); color: var(--teal); }
  .nav-login-btn {
    background: var(--teal); color: var(--navy-dark);
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.82rem;
    padding: 0.45rem 1.1rem; border-radius: 6px; text-decoration: none; transition: background 0.2s;
  }
  .nav-login-btn:hover { background: var(--teal-light); }

  /* ─── PAGE ─── */
  .page-wrap {
    max-width: 1100px; margin: 0 auto;
    padding: 100px 5% 80px;
    position: relative; z-index: 1;
  }

  /* ─── GREETING ─── */
  .greeting {
    margin-bottom: 2.5rem;
  }
  .greeting-label {
    font-family: 'Fira Code', monospace; font-size: 0.7rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--teal); margin-bottom: 0.6rem;
  }
  .greeting-name {
    font-family: 'Outfit', sans-serif; font-weight: 900;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    color: var(--white-pure); letter-spacing: -0.03em; line-height: 1.1;
    margin-bottom: 0.5rem;
  }
  .greeting-sub { font-size: 1rem; color: var(--muted); font-weight: 300; }

  /* ─── SECTION HEADING ─── */
  .section-heading {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 1.1rem; color: var(--white-pure);
    letter-spacing: -0.01em; margin-bottom: 1.2rem;
    display: flex; align-items: center; gap: 0.7rem;
  }
  .section-heading::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* ─── ENROLLED COURSES GRID ─── */
  .courses-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
    margin-bottom: 3rem;
  }

  /* ─── COURSE CARD ─── */
  .course-card {
    background: var(--navy-card);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    text-decoration: none; color: inherit;
  }
  .course-card:hover {
    border-color: var(--teal-border);
    transform: translateY(-3px);
    box-shadow: 0 12px 36px rgba(107,191,181,0.1);
  }
  .course-thumb {
    height: 120px; display: flex; align-items: center;
    justify-content: center; font-size: 3rem; position: relative;
  }
  .course-thumb-teal   { background: linear-gradient(135deg, rgba(14,80,74,0.9), rgba(26,100,94,0.8)); }
  .course-thumb-blue   { background: linear-gradient(135deg, rgba(26,20,100,0.9), rgba(37,32,152,0.8)); }
  .course-thumb-purple { background: linear-gradient(135deg, rgba(60,20,100,0.9), rgba(80,30,130,0.8)); }
  .course-body { padding: 1.4rem; flex: 1; display: flex; flex-direction: column; }
  .course-level {
    font-family: 'Fira Code', monospace; font-size: 0.65rem;
    color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .course-title {
    font-family: 'Outfit', sans-serif; font-weight: 700;
    font-size: 0.95rem; color: var(--white-pure);
    line-height: 1.3; margin-bottom: 0.8rem; flex: 1;
  }

  /* ─── PROGRESS BAR ON CARD ─── */
  .card-progress { margin-bottom: 1rem; }
  .card-progress-label {
    display: flex; justify-content: space-between;
    font-family: 'Fira Code', monospace; font-size: 0.65rem;
    color: var(--muted); margin-bottom: 0.4rem;
  }
  .card-progress-bar {
    height: 4px; background: rgba(107,191,181,0.15);
    border-radius: 2px; overflow: hidden;
  }
  .card-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 2px; transition: width 0.6s ease;
  }

  /* ─── CONTINUE BUTTON ─── */
  .btn-continue {
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    background: var(--teal); color: var(--navy-dark);
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.85rem;
    padding: 0.65rem 1.2rem; border-radius: 8px;
    text-decoration: none; transition: background 0.2s;
    box-shadow: 0 3px 12px rgba(107,191,181,0.25);
  }
  .btn-continue:hover { background: var(--teal-light); }
  .btn-continue.completed {
    background: rgba(74,222,128,0.15); color: var(--green);
    border: 1px solid rgba(74,222,128,0.3);
    box-shadow: none;
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center; padding: 4rem 2rem;
    background: var(--navy-card); border: 1px solid var(--border);
    border-radius: 14px;
  }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.6; }
  .empty-state h3 {
    font-family: 'Outfit', sans-serif; font-weight: 700;
    font-size: 1.1rem; color: var(--white-pure); margin-bottom: 0.6rem;
  }
  .empty-state p { font-size: 0.9rem; color: var(--muted); margin-bottom: 1.5rem; }
  .btn-browse {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--teal); color: var(--navy-dark);
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.9rem;
    padding: 0.7rem 1.6rem; border-radius: 8px; text-decoration: none;
    box-shadow: 0 3px 12px rgba(107,191,181,0.25); transition: background 0.2s;
  }
  .btn-browse:hover { background: var(--teal-light); }

  /* ─── LOADING SKELETON ─── */
  .skeleton {
    background: linear-gradient(90deg,
      rgba(107,191,181,0.06) 0%, rgba(107,191,181,0.12) 50%, rgba(107,191,181,0.06) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite; border-radius: 6px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ─── EXPLORE BANNER ─── */
  .explore-banner {
    background: var(--navy-card); border: 1px solid var(--teal-border);
    border-radius: 14px; padding: 2rem 2.5rem;
    display: flex; align-items: center; justify-content: space-between;
    gap: 2rem; flex-wrap: wrap;
    position: relative; overflow: hidden;
  }
  .explore-banner::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 60% 100% at 0% 50%, rgba(107,191,181,0.06), transparent);
    pointer-events: none;
  }
  .explore-text h3 {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 1.1rem; color: var(--white-pure); margin-bottom: 0.3rem;
  }
  .explore-text p { font-size: 0.9rem; color: var(--muted); font-weight: 300; }

  footer {
    position: relative; z-index: 1;
    background: var(--navy-dark); border-top: 1px solid var(--border);
    padding: 2rem 5%; text-align: center;
    font-size: 0.78rem; color: var(--muted);
  }

  @media (max-width: 600px) {
    nav { padding: 0 1.2rem; }
    .page-wrap { padding: 90px 1.2rem 60px; }
    .explore-banner { padding: 1.5rem; }
  }
  /* ─── NAV MINHA ÁREA BUTTON ─── */
  .nav-minha-area {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--teal-dim); border: 1px solid var(--teal-border);
    color: var(--teal-light); font-family: 'Outfit', sans-serif;
    font-weight: 600; font-size: 0.82rem;
    padding: 0.4rem 0.9rem; border-radius: 6px; text-decoration: none;
    transition: all 0.2s;
  }
  .nav-minha-area:hover {
    background: rgba(107,191,181,0.22); border-color: var(--teal);
    color: var(--white-pure);
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">HZ INVEST</a>
  <div class="nav-right">
    <a href="cursos.html" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
      Ver cursos
    </a>
    <div id="nav-user-pill"></div>
  </div>
</nav>

<div class="page-wrap">

  <!-- GREETING -->
  <div class="greeting" id="greetingArea">
    <div class="greeting-label">// minha área</div>
    <div class="greeting-name skeleton" style="width:260px;height:2.4rem;"></div>
  </div>

  <!-- ENROLLED COURSES -->
  <div class="section-heading">Meus cursos</div>
  <div class="courses-grid" id="coursesGrid">
    <!-- skeleton -->
    <div style="background:var(--navy-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;">
      <div class="skeleton" style="height:120px;"></div>
      <div style="padding:1.4rem;">
        <div class="skeleton" style="height:0.7rem;width:40%;margin-bottom:0.6rem;"></div>
        <div class="skeleton" style="height:1rem;width:80%;margin-bottom:0.4rem;"></div>
        <div class="skeleton" style="height:0.8rem;width:60%;margin-bottom:1.2rem;"></div>
        <div class="skeleton" style="height:2.4rem;border-radius:8px;"></div>
      </div>
    </div>
  </div>

  <!-- EXPLORE MORE -->
  <div class="explore-banner">
    <div class="explore-text">
      <h3>Explore mais cursos</h3>
      <p>Temos cursos de renda fixa, ações, FIIs, aposentadoria e muito mais.</p>
    </div>
    <a href="cursos.html" class="btn-browse">Ver todos os cursos →</a>
  </div>

</div>

<footer>© 2025 HZ Invest · Todos os direitos reservados</footer>

<!-- ── COURSE CATALOG ───────────────────────────────────────────────────
  Add an entry here for every course you create.
  playerPage: the player HTML file for this course
  totalLessons: total number of lessons in COURSE_DATA for that player
────────────────────────────────────────────────────────────────────── -->
<script>
const CATALOG = [
  {
    id:           'dinheiro101',
    title:        'Dinheiro 101: Como Organizar Sua Vida Financeira',
    level:        'Iniciante · Módulo 1',
    emoji:        '💰',
    thumbClass:   'course-thumb-teal',
    playerPage:   'dinheiro101-player.html',
    detailPage:   'dinheiro101.html',
    totalLessons: 18,
    free:         true,
  },
  {
    id:           'rendafixa',
    title:        'Meu Primeiro Investimento: Renda Fixa sem Medo',
    level:        'Iniciante · Módulo 2',
    emoji:        '📈',
    thumbClass:   'course-thumb-blue',
    playerPage:   'rendafixa-player.html',
    detailPage:   'rendafixa.html',
    totalLessons: 17,
    free:         true,
  },
  {
    id:           'sairdovermelho',
    title:        'Sair do Vermelho: Entenda e Elimine Suas Dívidas',
    level:        'Iniciante · Módulo 3',
    emoji:        '🎯',
    thumbClass:   'course-thumb-purple',
    playerPage:   'sairdovermelho-player.html',
    detailPage:   'sairdovermelho.html',
    totalLessons: 17,
    free:         true,
  },
];
</script>

<script type="module">
import { auth, bindNavUser, requireAuth, onAuthStateChanged,
         doc, getDoc, db } from './auth.js';

requireAuth();
bindNavUser();

onAuthStateChanged(auth, async user => {
  if (!user) return;

  // Update greeting
  const name = user.displayName ? user.displayName.split(' ')[0] : user.email.split('@')[0];
  document.getElementById('greetingArea').innerHTML = `
    <div class="greeting-label">// minha área</div>
    <div class="greeting-name">Olá, ${name} 👋</div>
    <div class="greeting-sub">Bem-vinda de volta. Continue de onde parou.</div>
  `;

  // Load enrollments + progress for each catalog course
  const grid = document.getElementById('coursesGrid');
  grid.innerHTML = '';

  const enrolledCards = [];

  for (const course of CATALOG) {
    // Check enrollment
    const enrollSnap = await getDoc(doc(db, 'enrollments', user.uid, 'courses', course.id));
    if (!enrollSnap.exists()) continue;

    // Load progress
    const progSnap = await getDoc(doc(db, 'progress', user.uid, 'courses', course.id));
    const progData = progSnap.exists() ? progSnap.data() : {};
    const done = Object.keys(progData).filter(k => progData[k]).length;
    const pct  = course.totalLessons ? Math.round((done / course.totalLessons) * 100) : 0;
    const isCompleted = pct === 100;

    const card = document.createElement('a');
    card.href = course.playerPage;
    card.className = 'course-card';
    card.innerHTML = `
      <div class="course-thumb ${course.thumbClass}">${course.emoji}</div>
      <div class="course-body">
        <div class="course-level">${course.level}</div>
        <div class="course-title">${course.title}</div>
        <div class="card-progress">
          <div class="card-progress-label">
            <span>${isCompleted ? '✓ Concluído' : 'Progresso'}</span>
            <span>${done}/${course.totalLessons} aulas · ${pct}%</span>
          </div>
          <div class="card-progress-bar">
            <div class="card-progress-fill" style="width:${pct}%"></div>
          </div>
        </div>
        <div class="${'btn-continue' + (isCompleted ? ' completed' : '')}">
          ${isCompleted
            ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Curso concluído`
            : (done === 0
                ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Começar agora`
                : `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg> Continuar — Aula ${done + 1}`)}
        </div>
      </div>
    `;
    enrolledCards.push(card);
  }

  if (enrolledCards.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;">
        <div class="empty-icon">📚</div>
        <h3>Você ainda não está matriculada em nenhum curso</h3>
        <p>Explore nossos cursos gratuitos e comece sua jornada financeira hoje.</p>
        <a href="cursos.html" class="btn-browse">Explorar cursos →</a>
      </div>
    `;
  } else {
    enrolledCards.forEach(card => grid.appendChild(card));
  }
});
</script>
</body>
</html>
