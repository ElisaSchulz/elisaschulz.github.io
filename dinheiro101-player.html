<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinheiro 101 — Aulas · HZ Invest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-dark:   #120e4e;
    --navy-mid:    #1e1875;
    --teal:        #6bbfb5;
    --teal-light:  #8dd4cb;
    --teal-dim:    rgba(107,191,181,0.14);
    --teal-border: rgba(107,191,181,0.25);
    --white-pure:  #ffffff;
    --muted:       rgba(196,193,230,0.55);
    --text:        rgba(220,218,245,0.88);
    --border:      rgba(107,191,181,0.12);
    --green:       #4ade80;
    --amber:       #fbbf24;
    --red:         #f87171;
    --navy-card:   rgba(26,20,100,0.6);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--navy-dark);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(107,191,181,0.06) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    height: 60px; padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(12,9,60,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    gap: 1rem;
  }
  .nav-left { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
  .nav-logo {
    font-family: 'Outfit', sans-serif; font-weight: 900;
    font-size: 1.1rem; color: var(--white-pure);
    text-decoration: none; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .nav-sep { color: var(--border); font-size: 1.2rem; }
  .nav-course-title {
    font-size: 0.85rem; color: var(--muted); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
  }
  .nav-right { display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }

  /* progress bar in nav */
  .nav-progress {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: 'Fira Code', monospace; font-size: 0.7rem; color: var(--muted);
  }
  .nav-progress-bar {
    width: 100px; height: 4px;
    background: rgba(107,191,181,0.15); border-radius: 2px; overflow: hidden;
  }
  .nav-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 2px; transition: width 0.5s ease;
    width: 0%;
  }

  /* nav user pill */
  #nav-user-pill { display:none; align-items:center; gap:0.75rem; }
  .nav-user-name { font-size:0.82rem; color:var(--teal-light); font-weight:600; }
  .nav-signout {
    background:transparent; border:1px solid var(--teal-border);
    color:var(--muted); font-family:'Fira Code',monospace; font-size:0.65rem;
    padding:0.2rem 0.6rem; border-radius:4px; cursor:pointer; transition:all 0.2s;
  }
  .nav-signout:hover { border-color:var(--teal); color:var(--teal); }
  .nav-back {
    display: inline-flex; align-items: center; gap: 0.4rem;
    color: var(--muted); text-decoration: none; font-size: 0.8rem;
    transition: color 0.2s; white-space: nowrap;
  }
  .nav-back:hover { color: var(--teal); }

  /* ─── MAIN LAYOUT ─── */
  .player-wrap {
    display: grid;
    grid-template-columns: 1fr 340px;
    grid-template-rows: auto 1fr;
    min-height: 100vh;
    padding-top: 60px;
    position: relative; z-index: 1;
  }

  /* ─── VIDEO AREA (left, top) ─── */
  .video-area {
    background: #000;
    position: relative;
    padding-bottom: 56.25%; /* 16:9 */
    height: 0;
  }
  .video-area iframe {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border: none;
  }
  .video-placeholder {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, rgba(14,10,60,0.95), rgba(26,20,100,0.9));
    color: var(--muted); gap: 1rem; text-align: center; padding: 2rem;
  }
  .video-placeholder svg { color: var(--teal); opacity: 0.6; }
  .video-placeholder p { font-size: 0.9rem; max-width: 300px; line-height: 1.6; }

  /* ─── LESSON INFO (left, bottom) ─── */
  .lesson-info {
    padding: 1.8rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  .lesson-module-label {
    font-family: 'Fira Code', monospace; font-size: 0.68rem;
    color: var(--teal); letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .lesson-title-main {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 1.3rem; color: var(--white-pure);
    letter-spacing: -0.02em; margin-bottom: 0.8rem; line-height: 1.2;
  }
  .lesson-desc {
    font-size: 0.92rem; color: var(--muted); line-height: 1.7;
    max-width: 640px; margin-bottom: 1.2rem;
  }
  .lesson-actions {
    display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
  }
  .btn-complete {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--teal-dim); border: 1px solid var(--teal-border);
    color: var(--teal-light); font-family: 'Outfit', sans-serif;
    font-weight: 600; font-size: 0.82rem;
    padding: 0.5rem 1.1rem; border-radius: 6px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-complete:hover { background: rgba(107,191,181,0.22); border-color: var(--teal); color: var(--white-pure); }
  .btn-complete.done {
    background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.3);
    color: var(--green); cursor: default;
  }
  .btn-next {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--teal); color: var(--navy-dark);
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.82rem;
    padding: 0.5rem 1.2rem; border-radius: 6px; border: none;
    cursor: pointer; text-decoration: none;
    transition: background 0.2s, transform 0.15s;
    box-shadow: 0 3px 12px rgba(107,191,181,0.25);
  }
  .btn-next:hover { background: var(--teal-light); transform: translateY(-1px); }
  .btn-next:disabled { opacity: 0.4; cursor: default; transform: none; }

  /* ─── PDF DOWNLOADS ─── */
  .pdf-section {
    padding: 1.4rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  .pdf-section h4 {
    font-family: 'Fira Code', monospace; font-size: 0.68rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 0.8rem;
  }
  .pdf-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .pdf-item {
    display: flex; align-items: center; gap: 0.75rem;
    background: var(--navy-card); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.7rem 1rem;
    text-decoration: none; color: var(--text);
    transition: border-color 0.2s, background 0.2s;
  }
  .pdf-item:hover { border-color: var(--teal-border); background: rgba(26,20,100,0.8); color: var(--white-pure); }
  .pdf-icon {
    width: 32px; height: 32px; border-radius: 6px;
    background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--red);
  }
  .pdf-info { flex: 1; min-width: 0; }
  .pdf-name { font-size: 0.85rem; font-weight: 600; color: var(--white-pure); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pdf-size { font-family: 'Fira Code', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 0.1rem; }
  .pdf-download { color: var(--teal); flex-shrink: 0; }

  /* ─── SIDEBAR ─── */
  .sidebar {
    grid-row: 1 / 3;
    grid-column: 2;
    background: rgba(14,10,54,0.9);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    max-height: calc(100vh - 60px);
    position: sticky; top: 60px;
  }
  .sidebar-header {
    padding: 1.2rem 1.2rem 0.8rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: rgba(12,9,54,0.98);
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  .sidebar-title {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 0.9rem; color: var(--white-pure);
    letter-spacing: -0.01em; margin-bottom: 0.6rem;
  }
  .sidebar-progress {
    display: flex; align-items: center; gap: 0.6rem;
    font-family: 'Fira Code', monospace; font-size: 0.65rem; color: var(--muted);
  }
  .sidebar-progress-bar {
    flex: 1; height: 3px;
    background: rgba(107,191,181,0.15); border-radius: 2px; overflow: hidden;
  }
  .sidebar-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--teal-light));
    border-radius: 2px; transition: width 0.5s ease; width: 0%;
  }

  /* ─── SIDEBAR MODULES ─── */
  .mod-group { border-bottom: 1px solid var(--border); }
  .mod-header {
    display: flex; align-items: center; gap: 0.7rem;
    padding: 0.85rem 1.2rem; cursor: pointer;
    transition: background 0.15s; user-select: none;
  }
  .mod-header:hover { background: rgba(107,191,181,0.04); }
  .mod-num {
    font-family: 'Fira Code', monospace; font-size: 0.6rem;
    color: var(--teal); letter-spacing: 0.08em;
    background: var(--teal-dim); border: 1px solid var(--teal-border);
    padding: 0.1rem 0.4rem; border-radius: 3px; flex-shrink: 0;
  }
  .mod-label { font-size: 0.82rem; font-weight: 600; color: var(--white-pure); flex: 1; }
  .mod-chevron { color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
  .mod-group.open .mod-chevron { transform: rotate(180deg); }
  .mod-lessons { display: none; }
  .mod-group.open .mod-lessons { display: block; }

  /* ─── SIDEBAR LESSONS ─── */
  .s-lesson {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.65rem 1.2rem 0.65rem 2.2rem;
    cursor: pointer; transition: background 0.15s;
    border-top: 1px solid rgba(107,191,181,0.05);
  }
  .s-lesson:hover { background: rgba(107,191,181,0.06); }
  .s-lesson.active { background: var(--teal-dim); border-left: 2px solid var(--teal); padding-left: calc(2.2rem - 2px); }
  .s-lesson.completed .s-lesson-icon { color: var(--green); }
  .s-lesson.completed .s-lesson-name { color: var(--muted); }
  .s-lesson-icon { color: var(--muted); flex-shrink: 0; transition: color 0.2s; }
  .s-lesson.active .s-lesson-icon { color: var(--teal); }
  .s-lesson-name { font-size: 0.8rem; color: var(--text); flex: 1; line-height: 1.4; }
  .s-lesson.active .s-lesson-name { color: var(--white-pure); font-weight: 600; }
  .s-lesson-dur {
    font-family: 'Fira Code', monospace; font-size: 0.62rem;
    color: var(--muted); flex-shrink: 0;
  }
  .s-pdf-item {
    display: flex; align-items: center; gap: 0.65rem;
    padding: 0.5rem 1.2rem 0.5rem 2.2rem;
    text-decoration: none;
    border-top: 1px solid rgba(107,191,181,0.05);
    transition: background 0.15s;
  }
  .s-pdf-item:hover { background: rgba(248,113,113,0.05); }
  .s-pdf-icon { color: var(--red); flex-shrink: 0; opacity: 0.7; }
  .s-pdf-name { font-size: 0.75rem; color: var(--muted); }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 900px) {
    .player-wrap { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
    .sidebar {
      grid-row: 3; grid-column: 1;
      position: static; max-height: none;
      border-left: none; border-top: 1px solid var(--border);
    }
    .nav-course-title { display: none; }
    .nav-progress { display: none; }
  }
  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    .lesson-info { padding: 1.2rem 1rem; }
    .pdf-section { padding: 1rem; }
  }
  /* ─── NAV MINHA ÁREA BUTTON ─── */
  .nav-minha-area {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: var(--teal-dim); border: 1px solid var(--teal-border);
    color: var(--teal-light); font-family: 'Outfit', sans-serif;
    font-weight: 600; font-size: 0.82rem;
    padding: 0.4rem 0.9rem; border-radius: 6px; text-decoration: none;
    transition: all 0.2s;
  }
  .nav-minha-area:hover {
    background: rgba(107,191,181,0.22); border-color: var(--teal);
    color: var(--white-pure);
  }
</style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav>
  <div class="nav-left">
    <a href="index.html" class="nav-logo">HZ INVEST</a>
    <span class="nav-sep">|</span>
    <span class="nav-course-title">Dinheiro 101</span>
  </div>
  <div class="nav-right">
    <div class="nav-progress">
      <div class="nav-progress-bar"><div class="nav-progress-fill" id="navProgressFill"></div></div>
      <span id="navProgressPct">0%</span>
    </div>
    <a href="dinheiro101.html" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
      Detalhes
    </a>
    <div id="nav-user-pill"></div>
  </div>
</nav>

<!-- ─── PLAYER LAYOUT ─── -->
<div class="player-wrap">

  <!-- VIDEO EMBED -->
  <div class="video-area" id="videoArea">
    <div class="video-placeholder" id="videoPlaceholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
      <p>Selecione uma aula no menu ao lado para começar.</p>
    </div>
  </div>

  <!-- LESSON INFO + PDFS -->
  <div id="lessonInfoArea">
    <!-- filled by JS when a lesson is selected -->
  </div>

  <!-- ─── SIDEBAR ─── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Dinheiro 101</div>
      <div class="sidebar-progress">
        <span id="sidebarPct">0%</span>
        <div class="sidebar-progress-bar"><div class="sidebar-progress-fill" id="sidebarFill"></div></div>
        <span id="sidebarFrac">0/18</span>
      </div>
    </div>
    <div id="modulesContainer">
      <!-- built by JS from COURSE_DATA -->
    </div>
  </aside>

</div><!-- end player-wrap -->

<!-- ─── AUTH GATE — shown when not logged in ─── -->
<div id="authGate" style="
  position:fixed;inset:0;z-index:9999;
  background:rgba(10,7,50,0.97);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.5rem;
  backdrop-filter:blur(8px);
">
  <!-- Loading state (shown first while Firebase initialises) -->
  <div id="gateLoading" style="display:flex;flex-direction:column;align-items:center;gap:1rem;">
    <div style="width:36px;height:36px;border-radius:50%;border:3px solid rgba(107,191,181,0.2);border-top-color:#6bbfb5;animation:spin 0.8s linear infinite;"></div>
    <p style="font-family:'Fira Code',monospace;font-size:0.72rem;color:rgba(196,193,230,0.55);letter-spacing:0.08em;">verificando acesso...</p>
  </div>

  <!-- Login/signup card (shown once Firebase confirms not logged in) -->
  <div id="gateCard" style="display:none;width:100%;max-width:420px;">
    <div style="text-align:center;margin-bottom:1.8rem;">
      <a href="index.html" style="font-family:'Outfit',sans-serif;font-weight:900;font-size:1.2rem;color:#fff;text-decoration:none;letter-spacing:.04em;text-transform:uppercase;">HZ INVEST</a>
      <p style="font-size:.85rem;color:rgba(196,193,230,0.55);margin-top:.4rem;">Crie uma conta gratuita para assistir às aulas</p>
    </div>

    <!-- Tabs -->
    <div style="display:flex;background:rgba(18,14,78,0.7);border-radius:8px;padding:4px;gap:4px;margin-bottom:1.4rem;">
      <button id="tabLogin" onclick="gateTab('login')" style="flex:1;padding:.55rem;background:#6bbfb5;border:none;border-radius:6px;font-family:'Outfit',sans-serif;font-weight:700;font-size:.85rem;color:#120e4e;cursor:pointer;">Entrar</button>
      <button id="tabSignup" onclick="gateTab('signup')" style="flex:1;padding:.55rem;background:transparent;border:none;border-radius:6px;font-family:'Outfit',sans-serif;font-weight:600;font-size:.85rem;color:rgba(196,193,230,0.55);cursor:pointer;">Criar conta</button>
    </div>

    <!-- Error message -->
    <div id="gateMsg" style="display:none;padding:.7rem 1rem;border-radius:8px;font-size:.82rem;margin-bottom:.9rem;line-height:1.5;"></div>

    <!-- LOGIN FORM -->
    <div id="formLogin">
      <div style="margin-bottom:.9rem;">
        <label style="display:block;font-family:'Fira Code',monospace;font-size:.65rem;color:rgba(196,193,230,0.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;">E-mail</label>
        <input id="gEmail" type="email" placeholder="seu@email.com" autocomplete="email"
          style="width:100%;background:rgba(18,14,78,0.8);border:1px solid rgba(107,191,181,0.12);border-radius:8px;padding:.75rem 1rem;color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;" onfocus="this.style.borderColor='#6bbfb5'" onblur="this.style.borderColor='rgba(107,191,181,0.12)'">
      </div>
      <div style="margin-bottom:1.2rem;">
        <label style="display:block;font-family:'Fira Code',monospace;font-size:.65rem;color:rgba(196,193,230,0.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;">Senha</label>
        <input id="gPass" type="password" placeholder="••••••••" autocomplete="current-password"
          style="width:100%;background:rgba(18,14,78,0.8);border:1px solid rgba(107,191,181,0.12);border-radius:8px;padding:.75rem 1rem;color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;" onfocus="this.style.borderColor='#6bbfb5'" onblur="this.style.borderColor='rgba(107,191,181,0.12)'">
      </div>
      <button onclick="gateLogin()" id="btnGateLogin"
        style="width:100%;padding:.85rem;background:#6bbfb5;color:#120e4e;font-family:'Outfit',sans-serif;font-weight:700;font-size:.95rem;border:none;border-radius:8px;cursor:pointer;box-shadow:0 4px 20px rgba(107,191,181,0.3);">
        Entrar
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="formSignup" style="display:none;">
      <div style="margin-bottom:.9rem;">
        <label style="display:block;font-family:'Fira Code',monospace;font-size:.65rem;color:rgba(196,193,230,0.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;">Nome completo</label>
        <input id="gName" type="text" placeholder="Seu nome" autocomplete="name"
          style="width:100%;background:rgba(18,14,78,0.8);border:1px solid rgba(107,191,181,0.12);border-radius:8px;padding:.75rem 1rem;color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;" onfocus="this.style.borderColor='#6bbfb5'" onblur="this.style.borderColor='rgba(107,191,181,0.12)'">
      </div>
      <div style="margin-bottom:.9rem;">
        <label style="display:block;font-family:'Fira Code',monospace;font-size:.65rem;color:rgba(196,193,230,0.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;">E-mail</label>
        <input id="gEmail2" type="email" placeholder="seu@email.com" autocomplete="email"
          style="width:100%;background:rgba(18,14,78,0.8);border:1px solid rgba(107,191,181,0.12);border-radius:8px;padding:.75rem 1rem;color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;" onfocus="this.style.borderColor='#6bbfb5'" onblur="this.style.borderColor='rgba(107,191,181,0.12)'">
      </div>
      <div style="margin-bottom:.9rem;">
        <label style="display:block;font-family:'Fira Code',monospace;font-size:.65rem;color:rgba(196,193,230,0.55);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem;">Senha (mín. 6 caracteres)</label>
        <input id="gPass2" type="password" placeholder="••••••••" autocomplete="new-password"
          style="width:100%;background:rgba(18,14,78,0.8);border:1px solid rgba(107,191,181,0.12);border-radius:8px;padding:.75rem 1rem;color:#fff;font-family:'Outfit',sans-serif;font-size:.9rem;outline:none;" onfocus="this.style.borderColor='#6bbfb5'" onblur="this.style.borderColor='rgba(107,191,181,0.12)'">
      </div>
      <div style="margin-bottom:1.2rem;">

// ════════════════════════════════════════════════════════
//  BUILD SIDEBAR
// ════════════════════════════════════════════════════════
function buildSidebar() {
  const container = document.getElementById('modulesContainer');

  COURSE_DATA.modules.forEach((mod, mi) => {
    const group = document.createElement('div');
    group.className = 'mod-group' + (mi === 0 ? ' open' : '');
    group.innerHTML = `

        <span class="mod-num">${mod.num}</span>
        <span class="mod-label">${mod.title}</span>
        <svg class="mod-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="mod-lessons" id="lessons-${mod.id}"></div>
    `;

    const lessonsEl = group.querySelector(`#lessons-${mod.id}`);
    mod.lessons.forEach(lesson => {
      if (lesson.youtubeId !== null) {
        // Video lesson row
        const row = document.createElement('div');
        row.className = 's-lesson';
        row.dataset.lessonId = lesson.id;
        row.innerHTML = `
          <svg class="s-lesson-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          <span class="s-lesson-name">${lesson.title}</span>
          <span class="s-lesson-dur">${lesson.duration}</span>

        row.addEventListener('click', () => selectLesson(lesson, mod));
        lessonsEl.appendChild(row);

      // PDF-only entries

        lesson.pdfs.forEach(pdf => {
          const pdfRow = document.createElement('a');
          pdfRow.className = 's-pdf-item';

          pdfRow.target = '_blank';

            <span class="s-pdf-name">${pdf.name}</span>
          `;
          lessonsEl.appendChild(pdfRow);
        });
      }
    });

    group.querySelector('.mod-header').addEventListener('click', () => {
      group.classList.toggle('open');

// ════════════════════════════════════════════════════════
//  SELECT LESSON
// ════════════════════════════════════════════════════════
function selectLesson(lesson, mod) {
  activeLessonId = lesson.id;

  // Highlight active sidebar row
  document.querySelectorAll('.s-lesson').forEach(r => r.classList.remove('active'));
  const activeRow = document.querySelector(`.s-lesson[data-lesson-id="${lesson.id}"]`);
  if (activeRow) activeRow.classList.add('active');

  // Swap video
  const videoArea = document.getElementById('videoArea');
  if (lesson.youtubeId && lesson.youtubeId !== 'SUBSTITUA_PELO_ID_DO_VIDEO') {
    videoArea.innerHTML = `<iframe
      src="https://www.youtube-nocookie.com/embed/${lesson.youtubeId}?rel=0&modestbranding=1"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen></iframe>`;
  } else {
    videoArea.innerHTML = `<div class="video-placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/></svg>
      <p>Adicione o ID do vídeo do YouTube no <code>COURSE_DATA</code> para este vídeo aparecer aqui.</p>
    </div>`;
  }

  // Find next lesson
  const allLessons = COURSE_DATA.modules.flatMap(m => m.lessons.filter(l => l.youtubeId !== null));
  const idx = allLessons.findIndex(l => l.id === lesson.id);
  const nextLesson = allLessons[idx + 1] || null;
  const nextMod = nextLesson ? COURSE_DATA.modules.find(m => m.lessons.some(l => l.id === nextLesson.id)) : null;

  const isDone = completedSet.has(lesson.id);

  // Render lesson info + PDFs
  const area = document.getElementById('lessonInfoArea');
  area.innerHTML = `
    <div class="lesson-info">
      <div class="lesson-module-label">${mod.num} · ${mod.title}</div>
      <div class="lesson-title-main">${lesson.title}</div>
      ${lesson.desc ? `<div class="lesson-desc">${lesson.desc}</div>` : ''}
      <div class="lesson-actions">
        <button class="btn-complete ${isDone ? 'done' : ''}" id="btnComplete">
          ${isDone
            ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Concluída`
            : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Marcar como concluída`}
        </button>
        ${nextLesson
          ? `<button class="btn-next" id="btnNext">Próxima aula: ${nextLesson.title} →</button>`
          : `<span style="font-size:0.82rem;color:var(--green);">🎉 Última aula do curso!</span>`}
      </div>
    </div>
    ${lesson.pdfs && lesson.pdfs.length ? `
    <div class="pdf-section">
      <h4>Material de apoio</h4>
      <div class="pdf-list">
        ${lesson.pdfs.map(pdf => `
          <a class="pdf-item" href="${pdf.url}" target="_blank" download>
            <div class="pdf-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            </div>
            <div class="pdf-info">
              <div class="pdf-name">${pdf.name}</div>
              <div class="pdf-size">PDF · ${pdf.size}</div>
            </div>
            <svg class="pdf-download" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </a>`).join('')}
      </div>
    </div>` : ''}
  `;

  // Bind complete button
  document.getElementById('btnComplete')?.addEventListener('click', () => completeLesson(lesson.id));

  // Bind next button
  if (nextLesson) {
    document.getElementById('btnNext')?.addEventListener('click', () => {
      // Open the module that contains the next lesson
      const modGroup = document.querySelector(`.mod-group`);
      document.querySelectorAll('.mod-group').forEach(g => {
        if (g.querySelector(`[data-lesson-id="${nextLesson.id}"]`)) g.classList.add('open');
      });
      selectLesson(nextLesson, nextMod);
    });
  }
}

// ════════════════════════════════════════════════════════
//  COMPLETE LESSON
// ════════════════════════════════════════════════════════
async function completeLesson(lessonId) {
  if (!currentUser || completedSet.has(lessonId)) return;
  completedSet.add(lessonId);

  // Persist to Firestore
  const ref = doc(db, 'progress', currentUser.uid, 'courses', 'dinheiro101');
  await setDoc(ref, { [lessonId]: true }, { merge: true });

  // Update complete button
  const btn = document.getElementById('btnComplete');
  if (btn) {
    btn.className = 'btn-complete done';
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Concluída`;
  }

  // Update sidebar row
  const row = document.querySelector(`.s-lesson[data-lesson-id="${lessonId}"]`);
  if (row) {
    row.classList.add('completed');
    row.querySelector('.s-lesson-icon').innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
  }

  updateProgressUI();
}

// ════════════════════════════════════════════════════════
//  PROGRESS UI
// ════════════════════════════════════════════════════════
function updateProgressUI() {
  const done = completedSet.size;
  const pct  = Math.round((done / TOTAL_LESSONS) * 100);

  document.getElementById('navProgressFill').style.width  = pct + '%';
  document.getElementById('navProgressPct').textContent   = pct + '%';
  document.getElementById('sidebarFill').style.width      = pct + '%';
  document.getElementById('sidebarPct').textContent       = pct + '%';
  document.getElementById('sidebarFrac').textContent      = `${done}/${TOTAL_LESSONS}`;
}

// ════════════════════════════════════════════════════════
//  LOAD PROGRESS FROM FIRESTORE
// ════════════════════════════════════════════════════════
async function loadProgress(uid) {
  const ref  = doc(db, 'progress', uid, 'courses', 'dinheiro101');
  const snap = await getDoc(ref);
  if (!snap.exists()) return;
  const data = snap.data();
  Object.keys(data).filter(k => data[k]).forEach(id => {
    completedSet.add(id);
    const row = document.querySelector(`.s-lesson[data-lesson-id="${id}"]`);
    if (row) {
      row.classList.add('completed');
      row.querySelector('.s-lesson-icon').innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`;
    }
  });
  updateProgressUI();
}

//  INLINE AUTH HELPERS
// ════════════════════════════════════════════════════════
import { signInWithEmailAndPassword, createUserWithEmailAndPassword,
         signInWithPopup, GoogleAuthProvider, updateProfile }
  from 'https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js';

function gateTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tabLogin').style.background  = isLogin ? '#6bbfb5' : 'transparent';
  document.getElementById('tabLogin').style.color       = isLogin ? '#120e4e' : 'rgba(196,193,230,0.55)';
  document.getElementById('tabSignup').style.background = isLogin ? 'transparent' : '#6bbfb5';
  document.getElementById('tabSignup').style.color      = isLogin ? 'rgba(196,193,230,0.55)' : '#120e4e';
  document.getElementById('formLogin').style.display    = isLogin ? 'block' : 'none';
  document.getElementById('formSignup').style.display   = isLogin ? 'none'  : 'block';
}
window.gateTab = gateTab;

function gateMsg(text, isError = true) {
  const el = document.getElementById('gateMsg');
  el.textContent = text;
  el.style.display = text ? 'block' : 'none';
  el.style.background = isError ? 'rgba(248,113,113,0.12)' : 'rgba(74,222,128,0.12)';
  el.style.border = isError ? '1px solid rgba(248,113,113,0.3)' : '1px solid rgba(74,222,128,0.3)';
  el.style.color = isError ? '#f87171' : '#4ade80';
}

function errPT(code) {
  return {
    'auth/user-not-found':       'Nenhuma conta com este e-mail.',
    'auth/wrong-password':       'Senha incorreta.',
    'auth/invalid-credential':   'E-mail ou senha incorretos.',
    'auth/email-already-in-use': 'Este e-mail já está cadastrado. Faça login.',
    'auth/weak-password':        'Use pelo menos 6 caracteres.',
    'auth/invalid-email':        'E-mail inválido.',
    'auth/too-many-requests':    'Muitas tentativas. Aguarde alguns minutos.',
  }[code] || 'Ocorreu um erro. Tente novamente.';
}

window.gateLogin = async function() {
  const email = document.getElementById('gEmail').value.trim();
  const pass  = document.getElementById('gPass').value;
  if (!email || !pass) { gateMsg('Preencha e-mail e senha.'); return; }
  const btn = document.getElementById('btnGateLogin');
  btn.disabled = true; btn.textContent = 'Aguarde...';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged fires next and opens the course
  } catch(e) {
    gateMsg(errPT(e.code));
    btn.disabled = false; btn.textContent = 'Entrar';
  }
};

window.gateSignup = async function() {
  const name  = document.getElementById('gName').value.trim();
  const email = document.getElementById('gEmail2').value.trim();
  const pass  = document.getElementById('gPass2').value;
  const conf  = document.getElementById('gPass3').value;
  if (!name || !email || !pass) { gateMsg('Preencha todos os campos.'); return; }
  if (pass !== conf)            { gateMsg('As senhas não coincidem.'); return; }
  if (pass.length < 6)         { gateMsg('Use pelo menos 6 caracteres.'); return; }
  const btn = document.getElementById('btnGateSignup');
  btn.disabled = true; btn.textContent = 'Criando conta...';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    // onAuthStateChanged fires next and opens the course
  } catch(e) {
    gateMsg(errPT(e.code));
    btn.disabled = false; btn.textContent = 'Criar conta gratuita';
  }
};

window.gateGoogle = async function() {
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch(e) { gateMsg(errPT(e.code)); }
};

// ════════════════════════════════════════════════════════
//  BOOT — single onAuthStateChanged handles everything
// ════════════════════════════════════════════════════════
buildSidebar();

onAuthStateChanged(auth, async user => {
  const gate    = document.getElementById('authGate');
  const loading = document.getElementById('gateLoading');
  const card    = document.getElementById('gateCard');

  if (!user) {
    // Not logged in — hide spinner, show login card in the gate
    loading.style.display = 'none';
    card.style.display    = 'block';
    return;
  }

  // Logged in — hide the gate entirely and show course content
  gate.style.display = 'none';
  currentUser = user;
  bindNavUser();
  await loadProgress(user.uid);

  const allLessons = COURSE_DATA.modules.flatMap(m =>
    m.lessons.filter(l => l.youtubeId !== null).map(l => ({ l, m }))
  );
  const next = allLessons.find(({ l }) => !completedSet.has(l.id)) || allLessons[0];
  if (next) selectLesson(next.l, next.m);
});
</script>
</body>
</html>
